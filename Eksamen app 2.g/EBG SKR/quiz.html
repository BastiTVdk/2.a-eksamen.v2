<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz & Training | English B-Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-slate-900 border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-full mx-auto px-6">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                        <i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <span class="font-black text-2xl tracking-tighter uppercase">English<span class="text-blue-600">B</span> Master</span>
                </div>
                <div class="hidden lg:flex space-x-8 font-bold text-slate-400 uppercase text-xs tracking-widest">
                    <a href="index.html" class="hover:text-white transition">Hjem</a>
                    <a href="grammar.html" class="hover:text-white transition">Grammatik</a>
                    <a href="essay.html" class="hover:text-white transition">Essay</a>
                    <a href="quiz.html" class="text-blue-500">Quiz</a>
                </div>
                <a href="index.html" class="text-slate-500 hover:text-white transition">
                    <i class="fas fa-times text-xl"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Quiz Engine Section -->
    <main class="flex-grow flex items-center justify-center py-20 px-6">
        <div class="max-w-2xl w-full bg-white/5 border border-white/10 rounded-[3rem] p-12 text-center relative overflow-hidden backdrop-blur-sm shadow-2xl">
            <div class="relative z-10">
                <div class="inline-block px-4 py-1 bg-blue-600 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-6">Verb Challenger v1.0</div>
                <h2 class="text-4xl font-black mb-2 tracking-tighter">The Verb Battle</h2>
                <p class="text-slate-400 mb-10 text-sm">Skriv den korrekte datidsform (Past Simple) for at vinde point.</p>
                
                <!-- Score & Stats -->
                <div class="flex justify-center gap-4 mb-10">
                    <div id="score-card" class="bg-white/10 px-8 py-3 rounded-2xl font-black text-2xl border border-white/5">
                        <span class="text-slate-500 text-[10px] block uppercase mb-1">Score</span>
                        <span id="score-val">0</span>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="bg-slate-900 p-10 rounded-[2.5rem] border border-white/5 mb-8">
                    <p class="text-[10px] uppercase font-black text-slate-600 mb-4 tracking-widest">Infinitiv:</p>
                    <h3 id="current-verb" class="text-6xl font-black mb-10 text-blue-400 tracking-tighter italic">Drive</h3>
                    <input type="text" id="quiz-ans" autocomplete="off" placeholder="Past simple her..." class="w-full bg-white/5 border-2 border-white/10 rounded-2xl p-6 text-center text-3xl font-bold focus:border-blue-500 outline-none transition placeholder-slate-700">
                </div>

                <button onclick="checkAns()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xl hover:bg-blue-500 transition-all shadow-xl shadow-blue-600/20 active:scale-95">Tjek Svar</button>
                <div id="feedback-msg" class="mt-8 font-bold min-h-[1.5em] text-lg"></div>
            </div>
            
            <!-- BG Watermark -->
            <div class="absolute -right-20 -bottom-20 text-[250px] font-black text-white/5 select-none pointer-events-none italic">TEST</div>
        </div>
    </main>

    <footer class="py-12 text-center text-slate-600 text-[10px] font-black uppercase tracking-widest">
        &copy; 2025 English B-Mastery Training Center
    </footer>

    <script>
        const verbList = [
            { i: "Drive", p: "drove" },
            { i: "Speak", p: "spoke" },
            { i: "Choose", p: "chose" },
            { i: "Sing", p: "sang" },
            { i: "Write", p: "wrote" },
            { i: "Fly", p: "flew" },
            { i: "Take", p: "took" }
        ];

        let idx = 0;
        let score = 0;

        function checkAns() {
            const input = document.getElementById('quiz-ans');
            const feedback = document.getElementById('feedback-msg');
            const scoreVal = document.getElementById('score-val');
            
            const user = input.value.trim().toLowerCase();
            const correct = verbList[idx].p.toLowerCase();

            if (user === correct) {
                feedback.textContent = "KORREKT! 🎯 Du er en stjerne!";
                feedback.className = "mt-8 font-bold text-green-400 animate-bounce";
                score += 10;
            } else {
                feedback.textContent = `ØV! Det rigtige svar var: ${verbList[idx].p}`;
                feedback.className = "mt-8 font-bold text-red-500";
            }

            scoreVal.textContent = score;
            
            setTimeout(() => {
                idx = Math.floor(Math.random() * verbList.length);
                document.getElementById('current-verb').textContent = verbList[idx].i;
                input.value = "";
                feedback.textContent = "";
                input.focus();
            }, 1800);
        }

        document.getElementById('quiz-ans').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAns();
        });
    </script>
</body>
</html>
