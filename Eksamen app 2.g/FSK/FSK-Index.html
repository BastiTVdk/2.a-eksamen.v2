<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fysik - Sankt Annæ 2.a</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&family=Outfit:wght@200;400;600;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            background: #050b18;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        .hero-text {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
        }

        /* Animeret partikel baggrund */
        .physics-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a1931 0%, #050b18 100%);
        }

        .particle {
            position: absolute;
            background: rgba(34, 211, 238, 0.2);
            border-radius: 50%;
            filter: blur(1px);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(100px); opacity: 0; }
        }

        /* Spil Elementer */
        #game-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            cursor: pointer;
            border-top: 1px solid rgba(34, 211, 238, 0.1);
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.05));
        }
        #ground-line {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        }
        #player {
            position: absolute;
            bottom: 40px;
            left: 10%;
            width: 44px;
            height: 44px;
            z-index: 50;
        }
        .obstacle {
            position: absolute;
            bottom: 40px;
            right: -100px;
            width: 34px;
            height: 50px;
        }
        .jump-anim {
            animation: jump 0.6s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        @keyframes jump {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-140px) scale(1.1); }
            70% { transform: translateY(-140px) scale(1.1); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Back Button UI */
        .back-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(34, 211, 238, 0.4);
        }

        #score-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 8rem;
            font-weight: 900;
            opacity: 0.05;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            white-space: nowrap;
            color: #22d3ee;
        }

        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
            50% { opacity: 0.5; text-shadow: none; }
        }

        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #22d3ee;
            border-radius: 50%;
            offset-path: path('M 22,22 m -18,0 a 18,18 0 1,0 36,0 a 18,18 0 1,0 -36,0');
            animation: orbit 1.5s infinite linear;
        }

        @keyframes orbit {
            from { offset-distance: 0%; }
            to { offset-distance: 100%; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start pt-16 px-6">

    <div class="physics-bg" id="particles"></div>

    <!-- GitHub Back Button - FIXED PATH -->
    <a href="../../index.html" class="back-btn mb-12 px-6 py-3 rounded-2xl flex items-center space-x-3 text-[11px] uppercase tracking-[0.25em] font-bold text-cyan-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span>Tilbage til forsiden</span>
    </a>

    <!-- Main Content -->
    <div class="text-center relative z-10">
        <div class="inline-block px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-[10px] font-bold uppercase tracking-widest mb-6 pulse">
            Kvantetilstand: Venter på observation
        </div>
        <h1 class="hero-text text-6xl md:text-9xl font-black mb-6 tracking-tighter leading-none">
            FY<span class="text-transparent" style="-webkit-text-stroke: 1px #22d3ee;">SIK</span>
        </h1>
        <p class="text-slate-400 max-w-md mx-auto text-lg font-light leading-relaxed">
            Vi afventer partikelstrømmen af spørgsmål for <span class="text-white font-medium">2.a</span>. Siden opdateres øjeblikkeligt derefter.
        </p>
    </div>

    <!-- Game Area -->
    <div id="game-container" onclick="handleAction()">
        <div id="score-display">0000</div>
        <div id="ground-line"></div>

        <!-- Player (Atom Icon) -->
        <div id="player">
            <div class="relative w-full h-full">
                <!-- Nukleus -->
                <div class="absolute inset-0 m-auto w-4 h-4 bg-cyan-400 rounded-full shadow-[0_0_15px_#22d3ee]"></div>
                <!-- Elektron Bane -->
                <svg class="absolute inset-0 w-full h-full opacity-30">
                    <circle cx="22" cy="22" r="18" stroke="white" fill="none" stroke-width="0.5" />
                </svg>
                <div class="orbit-dot"></div>
            </div>
        </div>

        <!-- Start/GameOver Message -->
        <div id="game-msg" class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <span class="text-cyan-400/20 uppercase tracking-[0.6em] text-xs font-bold">Tryk for at trodse tyngdekraften</span>
        </div>
    </div>

    <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-[9px] text-cyan-400/10 tracking-[0.3em] uppercase font-bold">
        E=mc² &bull; Sankt Annæ Gymnasium &bull; 2.a
    </p>

    <script>
        // Generer baggrundspartikler
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 1;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particleContainer.appendChild(p);
        }

        const player = document.getElementById("player");
        const container = document.getElementById("game-container");
        const scoreDisplay = document.getElementById("score-display");
        const gameMsg = document.getElementById("game-msg");
        
        let score = 0;
        let isJumping = false;
        let isGameOver = false;
        let gameStarted = false;
        let obstacles = [];
        let speed = 7;
        let nextSpawn = 0;

        function handleAction() {
            if (isGameOver) {
                resetGame();
                return;
            }
            if (!gameStarted) {
                gameStarted = true;
                gameMsg.style.display = 'none';
                gameLoop();
            }
            jump();
        }

        function jump() {
            if (!isJumping && gameStarted) {
                isJumping = true;
                player.classList.add('jump-anim');
                setTimeout(() => {
                    player.classList.remove('jump-anim');
                    isJumping = false;
                }, 600);
            }
        }

        function spawnObstacle() {
            const el = document.createElement("div");
            el.className = "obstacle";
            el.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" class="text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.6)]"><path d="M13,2L3,14H10V22L20,10H13V2Z"/></svg>`;
            container.appendChild(el);
            return { element: el, x: window.innerWidth + 100 };
        }

        function gameLoop() {
            if (!gameStarted || isGameOver) return;

            score++;
            if (score % 500 === 0) speed += 0.5;
            scoreDisplay.innerText = score.toString().padStart(4, '0');

            nextSpawn--;
            if (nextSpawn <= 0) {
                obstacles.push(spawnObstacle());
                nextSpawn = Math.floor(Math.random() * (120 - speed * 4)) + 70;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                obstacles[i].element.style.left = obstacles[i].x + "px";

                const pRect = player.getBoundingClientRect();
                const oRect = obstacles[i].element.getBoundingClientRect();

                if (
                    pRect.right - 12 > oRect.left && 
                    pRect.left + 12 < oRect.right && 
                    pRect.bottom - 8 > oRect.top
                ) {
                    endGame();
                }

                if (obstacles[i].x < -100) {
                    obstacles[i].element.remove();
                    obstacles.splice(i, 1);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameOver = true;
            gameMsg.style.display = 'flex';
            gameMsg.innerHTML = `
                <div class="text-center">
                    <p class="text-cyan-400 font-black text-xl mb-1 tracking-wider uppercase">Kvante-kollision!</p>
                    <p class="text-white/40 text-[9px] uppercase tracking-widest font-bold">Tryk for at re-materialisere</p>
                </div>
            `;
        }

        function resetGame() {
            obstacles.forEach(o => o.element.remove());
            obstacles = [];
            score = 0;
            speed = 7;
            isGameOver = false;
            gameStarted = true;
            scoreDisplay.innerText = "0000";
            gameMsg.style.display = 'none';
            gameLoop();
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "ArrowUp") {
                e.preventDefault();
                handleAction();
            }
        });

        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
