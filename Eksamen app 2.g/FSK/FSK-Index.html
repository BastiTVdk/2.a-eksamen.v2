<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fysik - 2.a</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            background: #050b18;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        /* Animeret Partikel Baggrund */
        .physics-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a1931 0%, #050b18 100%);
        }

        .particle {
            position: absolute;
            background: rgba(34, 211, 238, 0.2);
            border-radius: 50%;
            filter: blur(1px);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(100px); opacity: 0; }
        }

        .hero-text {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
        }

        /* Spil-området */
        #game-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            cursor: pointer;
            border-top: 1px solid rgba(34, 211, 238, 0.1);
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.03));
        }

        #player {
            position: absolute;
            bottom: 40px;
            left: 10%;
            width: 44px;
            height: 44px;
            z-index: 50;
        }

        .obstacle {
            position: absolute;
            bottom: 40px;
            right: -100px;
            width: 34px;
            height: 50px;
        }

        #ground-line {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        }

        .jump-anim {
            animation: jump 0.6s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        @keyframes jump {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-140px) scale(1.1); }
            70% { transform: translateY(-140px) scale(1.1); }
            100% { transform: translateY(0) scale(1); }
        }

        .pulse-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
            50% { opacity: 0.4; text-shadow: none; }
        }

        #score-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 6rem;
            font-weight: 900;
            opacity: 0.03;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            white-space: nowrap;
            color: #22d3ee;
        }

        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #22d3ee;
            border-radius: 50%;
            offset-path: path('M 22,22 m -18,0 a 18,18 0 1,0 36,0 a 18,18 0 1,0 -36,0');
            animation: orbit 1.5s infinite linear;
        }

        @keyframes orbit {
            from { offset-distance: 0%; }
            to { offset-distance: 100%; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start pt-20">

    <div class="physics-bg" id="particles"></div>

    <!-- Main Content -->
    <div class="relative z-10 text-center px-6">
        <h2 class="text-cyan-400 font-bold tracking-[0.5em] text-xs mb-4 uppercase pulse-text">Kvantetilstand: Venter på observation</h2>
        <h1 class="hero-text text-6xl md:text-8xl font-black mb-6 leading-none tracking-tighter">
            FY<span class="text-transparent" style="-webkit-text-stroke: 1px #22d3ee;">SIK</span>
        </h1>
        <p class="max-w-xl mx-auto text-slate-400 text-lg md:text-xl font-light tracking-wide">
            Siden for <span class="text-white font-medium">Sankt Annæ 2.a</span> opdateres så snart de fysiske love (og eksamensspørgsmålene) tillader det.
        </p>
    </div>

    <!-- Spil sektion -->
    <div id="game-container" onclick="handleAction()">
        <div id="score-display">0000</div>
        
        <div id="ground-line"></div>

        <!-- Player (Atom) -->
        <div id="player">
            <div class="relative w-full h-full">
                <!-- Nukleus -->
                <div class="absolute inset-0 m-auto w-4 h-4 bg-cyan-400 rounded-full shadow-[0_0_15px_#22d3ee]"></div>
                <!-- Elektron Bane -->
                <svg class="absolute inset-0 w-full h-full opacity-30">
                    <circle cx="22" cy="22" r="18" stroke="white" fill="none" stroke-width="0.5" />
                </svg>
                <div class="orbit-dot"></div>
            </div>
        </div>

        <!-- Game Overlay Message -->
        <div id="game-msg" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <span class="text-cyan-400/20 uppercase tracking-[0.5em] text-sm">Tap for at trodse tyngdekraften</span>
        </div>
    </div>

    <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-[10px] text-cyan-400/20 tracking-widest uppercase">
        E=mc² &bull; Sankt Annæ Gymnasium &bull; 2.a
    </p>

    <script>
        // Generer partikler i baggrunden
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 1;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particleContainer.appendChild(p);
        }

        const player = document.getElementById("player");
        const container = document.getElementById("game-container");
        const scoreDisplay = document.getElementById("score-display");
        const gameMsg = document.getElementById("game-msg");
        
        let score = 0;
        let isJumping = false;
        let isGameOver = false;
        let gameStarted = false;
        let obstacles = [];
        let speed = 7;
        let nextSpawn = 0;

        function handleAction() {
            if (isGameOver) {
                resetGame();
                return;
            }
            if (!gameStarted) {
                gameStarted = true;
                gameMsg.style.display = 'none';
                gameLoop();
            }
            jump();
        }

        function jump() {
            if (!isJumping) {
                isJumping = true;
                player.classList.add("jump-anim");
                setTimeout(() => {
                    player.classList.remove("jump-anim");
                    isJumping = false;
                }, 600);
            }
        }

        function spawnObstacle() {
            const el = document.createElement("div");
            el.className = "obstacle";
            
            // Fysik-tematiseret forhindringer (Elektricitet eller instabile kerner)
            const type = Math.random();
            if (type > 0.6) {
                // Lyn / Gnister
                el.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" class="text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.6)]"><path d="M13,2L3,14H10V22L20,10H13V2Z"/></svg>`;
            } else {
                // Instabil kerne
                el.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" class="text-purple-500 opacity-80"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" transform="rotate(180 12 12)"/></svg>`;
            }
            
            container.appendChild(el);
            return {
                element: el,
                x: window.innerWidth + 100
            };
        }

        function resetGame() {
            obstacles.forEach(o => o.element.remove());
            obstacles = [];
            score = 0;
            speed = 7;
            isGameOver = false;
            gameStarted = true;
            scoreDisplay.innerText = "0000";
            gameMsg.style.display = 'none';
            gameLoop();
        }

        function gameLoop() {
            if (!gameStarted || isGameOver) return;

            score++;
            if (score % 400 === 0) speed += 0.4;
            scoreDisplay.innerText = score.toString().padStart(4, '0');

            nextSpawn--;
            if (nextSpawn <= 0) {
                obstacles.push(spawnObstacle());
                nextSpawn = Math.floor(Math.random() * (120 - speed * 4)) + 60;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;
                obstacles[i].element.style.left = obstacles[i].x + "px";

                const pRect = player.getBoundingClientRect();
                const oRect = obstacles[i].element.getBoundingClientRect();

                // Collision detection
                if (
                    pRect.right - 12 > oRect.left &&
                    pRect.left + 12 < oRect.right &&
                    pRect.bottom - 8 > oRect.top
                ) {
                    endGame();
                }

                if (obstacles[i].x < -100) {
                    obstacles[i].element.remove();
                    obstacles.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameOver = true;
            gameMsg.style.display = 'flex';
            gameMsg.innerHTML = `
                <span class="text-cyan-400 font-black text-2xl mb-2">KVANTE-KOLLISION</span>
                <span class="text-white/40 text-xs tracking-widest uppercase">Klik for at re-materialisere</span>
            `;
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "ArrowUp") {
                e.preventDefault();
                handleAction();
            }
        });

        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
